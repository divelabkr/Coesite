name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

permissions:
  contents: read

jobs:
  type-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - uses: pnpm/action-setup@v4
        with:
          version: 10.33.4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm -r exec tsc --noEmit

  unit-test:
    runs-on: ubuntu-latest
    needs: type-check
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - uses: pnpm/action-setup@v4
        with:
          version: 10.33.4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm test

  scan-principles:
    runs-on: ubuntu-latest
    needs: type-check
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - uses: pnpm/action-setup@v4
        with:
          version: 10.33.4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: SCAN_DIR=packages bash scripts/scan-principles.sh

  constitution-drift:
    runs-on: ubuntu-latest
    needs: type-check
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - name: Check CLAUDE.md drift
        run: |
          sed '/[Ss]ync note/d' CLAUDE.md > /tmp/root-claude.md
          sed '/[Ss]ync note/d' docs/01-CLAUDE.md > /tmp/docs-claude.md
          diff -u /tmp/docs-claude.md /tmp/root-claude.md
      - name: Check agent spec alignment
        run: |
          grep -q 'Condition: 3-gate all green' .claude/agents/gate-enforcer.md
          grep -q 'coverage ≥ 80%' .claude/agents/test-sentinel.md
          for path in .claude/agents/*.md; do
            test "$(head -n 1 "$path")" = "---"
            test "$(grep -c '^---$' "$path")" -ge 2
          done

  security-wall:
    runs-on: ubuntu-latest
    needs: type-check
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - run: bash scripts/security-wall.sh
