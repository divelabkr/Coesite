name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

permissions:
  contents: read

jobs:
  install:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - uses: pnpm/action-setup@v4
        with:
          version: 10.33.4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile

  build:
    runs-on: ubuntu-latest
    needs: install
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - uses: pnpm/action-setup@v4
        with:
          version: 10.33.4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm run prisma:generate:ci
      - run: pnpm -r build

  type-check:
    runs-on: ubuntu-latest
    needs: install
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - uses: pnpm/action-setup@v4
        with:
          version: 10.33.4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm run prisma:generate:ci
      - run: pnpm -r exec tsc --noEmit

  test:
    runs-on: ubuntu-latest
    needs: [build, type-check]
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - uses: pnpm/action-setup@v4
        with:
          version: 10.33.4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm run prisma:generate:ci
      - run: TMPDIR=/tmp pnpm test

  e2e:
    runs-on: ubuntu-latest
    needs: [build, type-check]
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - uses: pnpm/action-setup@v4
        with:
          version: 10.33.4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm run prisma:generate:ci
      - run: TMPDIR=/tmp pnpm run test:e2e

  security-regressions:
    runs-on: ubuntu-latest
    needs: [build, type-check]
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - uses: pnpm/action-setup@v4
        with:
          version: 10.33.4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm run prisma:generate:ci
      - run: TMPDIR=/tmp pnpm run test:security

  dependency-audit:
    runs-on: ubuntu-latest
    needs: install
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - uses: pnpm/action-setup@v4
        with:
          version: 10.33.4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm audit --audit-level moderate

  prisma-validate:
    runs-on: ubuntu-latest
    needs: install
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - uses: pnpm/action-setup@v4
        with:
          version: 10.33.4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: DATABASE_URL=postgresql://user:pass@localhost:5432/coesite pnpm exec prisma validate --schema=prisma/schema.prisma

  scan-principles:
    runs-on: ubuntu-latest
    needs: type-check
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - uses: pnpm/action-setup@v4
        with:
          version: 10.33.4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm run prisma:generate:ci
      - run: SCAN_DIR=. bash scripts/scan-principles.sh

  secret-scan:
    runs-on: ubuntu-latest
    needs: install
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - run: bash scripts/secret-scan.sh

  constitution-drift:
    runs-on: ubuntu-latest
    needs: type-check
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - name: Check CLAUDE.md drift
        run: |
          sed '/[Ss]ync note/d' CLAUDE.md > /tmp/root-claude.md
          sed '/[Ss]ync note/d' docs/01-CLAUDE.md > /tmp/docs-claude.md
          diff -u /tmp/docs-claude.md /tmp/root-claude.md
      - name: Check agent spec alignment
        run: |
          grep -q 'Condition: 3-gate all green' .claude/agents/gate-enforcer.md
          grep -q 'coverage ≥ 80%' .claude/agents/test-sentinel.md
          for path in .claude/agents/*.md; do
            test "$(head -n 1 "$path")" = "---"
            test "$(grep -c '^---$' "$path")" -ge 2
          done

  security-wall:
    runs-on: ubuntu-latest
    needs: install
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - run: bash scripts/security-wall.sh
